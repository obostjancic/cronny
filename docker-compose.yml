version: '3.8'

services:
  cronny:
    build: .
    ports:
      - "3030:3030"
    volumes:
      # Persist SQLite database
      - cronny-data:/app/packages/server/.data
    env_file:
      - path: packages/server/.env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=3030
      - DATABASE_PATH=/app/packages/server/.data/db.sqlite
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - API_SECRET
      - API_PASSWORD
      - GEOCODE_API_KEY
      - OPENROUTER_API_KEY
      - WHATSAPP_PHONE
      - WHATSAPP_API_KEY
      - BASE_URL
    depends_on:
      - flaresolverr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - PORT=8191
    ports:
      - "8191:8191"
    restart: unless-stopped

volumes:
  cronny-data:
    driver: local
